    <circle cx="52" cy="49" r="31" fill="#ff5873"/><text x="52" y="61" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="900" fill="#fff">1</text>
    <text x="99" y="57" font-family="sans-serif" font-size="31" font-weight="900" fill="#0d2a63">ルールを つくる</text>
    <text x="38" y="91" font-family="sans-serif" font-size="19" font-weight="800" fill="#55718d">カードを じゅんばんに ならべよう</text>
    <g font-family="sans-serif" font-weight="900" filter="url(#shadow)">
      <g transform="translate(28 120)"><rect width="145" height="174" rx="20" fill="#eef8ff" stroke="#2d90dc" stroke-width="4"/><text x="72" y="80" text-anchor="middle" font-size="62" fill="#2388d7">→</text><text x="72" y="124" text-anchor="middle" font-size="23" fill="#0d2a63">みぎへ</text><text x="72" y="151" text-anchor="middle" font-size="20" fill="#4d6c89">1マス</text></g>
      <g transform="translate(188 120)"><rect width="145" height="174" rx="20" fill="#eef8ff" stroke="#2d90dc" stroke-width="4"/><text x="72" y="80" text-anchor="middle" font-size="62" fill="#2388d7">↑</text><text x="72" y="124" text-anchor="middle" font-size="23" fill="#0d2a63">うえへ</text><text x="72" y="151" text-anchor="middle" font-size="20" fill="#4d6c89">1マス</text></g>
      <g transform="translate(28 310)"><rect width="145" height="174" rx="20" fill="#fff4c9" stroke="#f0ad20" stroke-width="4"/><text x="72" y="78" text-anchor="middle" font-size="54">🎨</text><text x="72" y="124" text-anchor="middle" font-size="23" fill="#0d2a63">いろを</text><text x="72" y="151" text-anchor="middle" font-size="20" fill="#4d6c89">ぬる</text></g>
      <g transform="translate(188 310)"><rect width="145" height="174" rx="20" fill="#f0fff5" stroke="#42a965" stroke-width="4"/><text x="72" y="80" text-anchor="middle" font-size="58" fill="#36a35a">↻</text><text x="72" y="124" text-anchor="middle" font-size="23" fill="#0d2a63">くりかえす</text><text x="72" y="151" text-anchor="middle" font-size="20" fill="#4d6c89">なんども</text></g>
    </g>
  </g>

  <g transform="translate(410 136)">
