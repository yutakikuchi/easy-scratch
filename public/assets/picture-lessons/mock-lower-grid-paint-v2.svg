    <circle cx="52" cy="49" r="31" fill="#ff5873"/><text x="52" y="61" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="900" fill="#fff">2</text>
    <text x="99" y="57" font-family="sans-serif" font-size="31" font-weight="900" fill="#0d2a63">ほうがんしを うごかそう</text>
    <text x="99" y="88" font-family="sans-serif" font-size="19" font-weight="800" fill="#55718d">1マスずつ うごき、しょうがいぶつを よけよう</text>
    <g transform="translate(95 112)">
      <rect width="970" height="400" rx="18" fill="#f8fcff" stroke="#54a8dc" stroke-width="5"/>
      <g transform="translate(85 28)">
        <rect width="800" height="344" rx="8" fill="#f8fcff" stroke="#0d2a63" stroke-width="5"/>
        <g stroke="#78b6db" stroke-width="4"><path d="M100 0V344M200 0V344M300 0V344M400 0V344M500 0V344M600 0V344M700 0V344"/><path d="M0 86H800M0 172H800M0 258H800"/></g>
        <rect x="304" y="262" width="92" height="78" rx="12" fill="#ffcf33"/>
        <rect x="304" y="176" width="92" height="78" rx="12" fill="#35b7e8"/>
        <rect x="604" y="176" width="92" height="78" rx="12" fill="#ff6f91"/>
        <g fill="#6e7f91"><rect x="404" y="262" width="92" height="78" rx="12"/><rect x="404" y="176" width="92" height="78" rx="12"/><rect x="504" y="176" width="92" height="78" rx="12"/></g>
        <g fill="#fff" font-family="sans-serif" font-size="45" font-weight="900" text-anchor="middle"><text x="450" y="316">×</text><text x="450" y="230">×</text><text x="550" y="230">×</text></g>
        <path d="M150 301H350V215H650" fill="none" stroke="#fff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="17 19"/>
        <circle cx="150" cy="301" r="31" fill="#fff" stroke="#17884a" stroke-width="6"/>
        <image href="../lower-mascot.png" x="110" y="257" width="80" height="80" preserveAspectRatio="xMidYMid meet"/>
        <text x="646" y="225" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="900" fill="#fff">★</text>
      </g>
    </g>
  </g>

  <g transform="translate(28 708)" font-family="sans-serif" font-weight="900">
    <rect width="1544" height="164" rx="28" fill="#fff8e4" stroke="#f2b323" stroke-width="5"/>
    <text x="34" y="43" font-size="28" fill="#0d2a63">できた ルール</text>
    <text x="34" y="72" font-size="18" fill="#55718d">タップで けせるよ</text>
    <g transform="translate(250 24)" filter="url(#shadow)">
      <rect width="220" height="112" rx="20" fill="#fff" stroke="#2d90dc" stroke-width="4"/><text x="110" y="49" text-anchor="middle" font-size="25" fill="#0d2a63">みぎへ 1マス</text><text x="110" y="89" text-anchor="middle" font-size="35" fill="#2388d7">→</text>
      <rect x="238" width="220" height="112" rx="20" fill="#fff" stroke="#f0ad20" stroke-width="4"/><text x="348" y="49" text-anchor="middle" font-size="25" fill="#0d2a63">いろを ぬる</text><text x="348" y="89" text-anchor="middle" font-size="31">🎨</text>
      <rect x="476" width="220" height="112" rx="20" fill="#fff" stroke="#2d90dc" stroke-width="4"/><text x="586" y="49" text-anchor="middle" font-size="25" fill="#0d2a63">うえへ 1マス</text><text x="586" y="89" text-anchor="middle" font-size="35" fill="#2388d7">↑</text>
      <rect x="714" width="220" height="112" rx="20" fill="#fff" stroke="#42a965" stroke-width="4"/><text x="824" y="49" text-anchor="middle" font-size="25" fill="#0d2a63">くりかえす</text><text x="824" y="89" text-anchor="middle" font-size="35" fill="#36a35a">↻</text>
    </g>
    <g transform="translate(1210 28)" filter="url(#shadow)"><rect width="290" height="108" rx="24" fill="#ff5d70"/><text x="145" y="70" text-anchor="middle" font-size="39" fill="#fff">▶ うごかす</text></g>
  </g>
