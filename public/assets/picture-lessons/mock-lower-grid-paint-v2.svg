<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#d9eaf4" stroke-width="2"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#244b70" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1600" height="900" rx="42" fill="#f9fdff"/>
  <rect width="1600" height="900" rx="42" fill="url(#paper)"/>

  <rect x="28" y="24" width="1544" height="92" rx="28" fill="#fff" stroke="#75bce5" stroke-width="5"/>
  <text x="800" y="78" text-anchor="middle" font-family="sans-serif" font-size="45" font-weight="900" fill="#0d2a63">ほうがんし いろぬり</text>
  <text x="800" y="105" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="800" fill="#4d6c89">しょうがいぶつを よけて、3つの マスを ぬろう</text>

  <g transform="translate(28 136)">
